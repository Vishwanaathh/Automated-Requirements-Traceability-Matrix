<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RTM System</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #1e1e2f, #2c2c54);
    color: #fff;
}

h1 { text-align: center; padding: 20px; background: #111; }

.section {
    background: #2a2a40;
    border-radius: 12px;
    padding: 20px;
    margin: 20px;
}

.hidden { display: none; }

input, select {
    padding: 8px;
    margin: 6px;
    border-radius: 6px;
    border: none;
}

button {
    padding: 8px 14px;
    margin: 6px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #4CAF50;
    color: white;
}

button:disabled {
    background: #777;
    cursor: not-allowed;
}

button.logout { background: #e74c3c; }
button.danger { background: #ff4444; }
button.download { background: #3498db; }

table {
    width: 95%;
    margin: 20px auto;
    border-collapse: collapse;
    background: #1c1c2e;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #444;
    text-align: center;
}

.status-Pass { color: #00ff9c; }
.status-Fail { color: #ff4c4c; }
.status-Pending { color: #ffc107; }

#log {
    background: #000;
    color: #0f0;
    padding: 10px;
    height: 120px;
    overflow-y: auto;
    margin: 20px;
}

/* 🔥 LOADING OVERLAY */
#loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    z-index: 999;
    display: none;
}
</style>
</head>

<body>

<div id="loader">⏳ Processing...</div>

<h1>RTM System 🚀</h1>

<div id="registerPage" class="section">
<h2>Register</h2>
<input id="reg_username" placeholder="Username">
<input id="reg_password" placeholder="Password">
<input id="reg_role" placeholder="Role">
<button onclick="register(this)">Register</button>
<p><a href="#" onclick="showLogin()">Login</a></p>
</div>

<div id="loginPage" class="section hidden">
<h2>Login</h2>
<input id="login_username" placeholder="Username">
<input id="login_password" placeholder="Password">
<button onclick="login(this)">Login</button>
<p><a href="#" onclick="showRegister()">Register</a></p>
</div>

<div id="mainPage" class="hidden">

<button class="logout" onclick="logout()">Logout</button>
<button class="danger" onclick="clearDB(this)">⚠️ Clear DB</button>

<div class="section">
<h2>Upload Structured File</h2>
<input type="file" id="fileInput">
<button onclick="uploadFile(this)">Upload & AI Map</button>
</div>

<div class="section">
<h2>Upload SRS (FULL AI)</h2>
<input type="file" id="srsFile">
<button onclick="uploadSRS(this)">Upload SRS 🤖</button>
</div>

<div class="section">
<h2>Add Requirement</h2>
<input id="r_title" placeholder="Title">
<input id="r_desc" placeholder="Description">
<input id="r_priority" placeholder="Priority">
<button onclick="addRequirement(this)">Add</button>
<button onclick="getRequirements()">View</button>
</div>

<table id="reqTable" class="hidden">
<thead><tr><th>ID</th><th>Title</th><th>Description</th><th>Priority</th></tr></thead>
<tbody id="reqBody"></tbody>
</table>

<div class="section">
<h2>Add Test Case</h2>
<input id="t_title" placeholder="Title">
<input id="t_desc" placeholder="Description">
<input id="t_expected" placeholder="Expected Result">
<select id="t_status">
<option>Pass</option>
<option>Fail</option>
<option>Pending</option>
</select>
<button onclick="addTestCase(this)">Add</button>
<button onclick="getTestCases()">View</button>
</div>

<table id="tcTable" class="hidden">
<thead><tr><th>ID</th><th>Title</th><th>Description</th><th>Status</th></tr></thead>
<tbody id="tcBody"></tbody>
</table>

<div class="section">
<h2>RTM</h2>
<input id="req_id" type="number" placeholder="Req ID">
<input id="tc_id" type="number" placeholder="TC ID"><br>
<button onclick="linkRTM(this)">Manual Link</button>
<button onclick="autoRTM(this)">AI Map</button>
<button onclick="getRTM()">View</button>
<button class="download" onclick="downloadRTM(this)">⬇️ Download RTM</button>
</div>

<table>
<thead><tr><th>Req</th><th>Requirement</th><th>TC</th><th>TestCase</th><th>Status</th></tr></thead>
<tbody id="rtmBody"></tbody>
</table>

<div id="log"></div>

</div>

<script>
const API = "http://127.0.0.1:8000"

function showLoader(){document.getElementById("loader").style.display="flex"}
function hideLoader(){document.getElementById("loader").style.display="none"}

function btnLoad(btn, text){
    btn.disabled = true
    btn.dataset.old = btn.innerText
    btn.innerText = text
}

function btnReset(btn){
    btn.disabled = false
    btn.innerText = btn.dataset.old
}

function authHeaders(){
    return {"Content-Type":"application/json","Authorization":"Bearer "+localStorage.getItem("token")}
}

function showLogin(){registerPage.classList.add("hidden");loginPage.classList.remove("hidden")}
function showRegister(){loginPage.classList.add("hidden");registerPage.classList.remove("hidden")}
function showMain(){registerPage.classList.add("hidden");loginPage.classList.add("hidden");mainPage.classList.remove("hidden")}
function logout(){localStorage.removeItem("token");location.reload()}

function log(msg){document.getElementById("log").innerText += msg+"\n"}

/* -------- AUTH -------- */

function register(btn){
btnLoad(btn,"Registering...")
fetch(API+"/register",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:reg_username.value,password:reg_password.value,role:reg_role.value})})
.then(()=>{btnReset(btn);showLogin()})
}

function login(btn){
btnLoad(btn,"Logging in...")
fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:login_username.value,password:login_password.value})})
.then(r=>r.json()).then(d=>{
localStorage.setItem("token",d.access_token)
btnReset(btn)
showMain()
})
}

/* -------- CORE -------- */

function addRequirement(btn){
btnLoad(btn,"Adding...")
fetch(API+"/requirement",{method:"POST",headers:authHeaders(),
body:JSON.stringify({title:r_title.value,description:r_desc.value,priority:r_priority.value})})
.then(()=>{btnReset(btn);log("Requirement added")})
}

function addTestCase(btn){
btnLoad(btn,"Adding...")
fetch(API+"/testcase",{method:"POST",headers:authHeaders(),
body:JSON.stringify({title:t_title.value,description:t_desc.value,expected_result:t_expected.value,status:t_status.value})})
.then(()=>{btnReset(btn);log("Test case added")})
}

function linkRTM(btn){
btnLoad(btn,"Linking...")
fetch(API+"/rtmmap",{method:"POST",headers:authHeaders(),
body:JSON.stringify({reqid:Number(req_id.value),testid:Number(tc_id.value)})})
.then(()=>{btnReset(btn);log("Linked")})
}

/* -------- AI -------- */

function autoRTM(btn){
btnLoad(btn,"AI Mapping...")
showLoader()
fetch(API+"/auto-rtm",{method:"POST",headers:authHeaders()})
.then(()=>getRTM())
.finally(()=>{btnReset(btn);hideLoader()})
}

function uploadFile(btn){
btnLoad(btn,"Uploading...")
showLoader()
const file=fileInput.files[0]
const reader=new FileReader()
reader.onload=e=>{
fetch(API+"/auto-rtm-file",{method:"POST",headers:authHeaders(),
body:JSON.stringify({text:e.target.result})})
.then(()=>getRTM())
.finally(()=>{btnReset(btn);hideLoader()})
}
reader.readAsText(file)
}

function uploadSRS(btn){
btnLoad(btn,"Processing SRS...")
showLoader()
const file=srsFile.files[0]
const reader=new FileReader()
reader.onload=e=>{
fetch(API+"/auto-rtm-srs",{method:"POST",headers:authHeaders(),
body:JSON.stringify({text:e.target.result})})
.then(()=>getRTM())
.finally(()=>{btnReset(btn);hideLoader()})
}
reader.readAsText(file)
}

/* -------- VIEW -------- */

function getRequirements(){
fetch(API+"/requirements",{headers:authHeaders()})
.then(r=>r.json()).then(d=>{
reqTable.classList.remove("hidden");reqBody.innerHTML=""
d.forEach(x=>reqBody.innerHTML+=`<tr><td>${x.id}</td><td>${x.title}</td><td>${x.description}</td><td>${x.priority}</td></tr>`)
})
}

function getTestCases(){
fetch(API+"/testcases",{headers:authHeaders()})
.then(r=>r.json()).then(d=>{
tcTable.classList.remove("hidden");tcBody.innerHTML=""
d.forEach(x=>tcBody.innerHTML+=`<tr><td>${x.id}</td><td>${x.title}</td><td>${x.description}</td><td>${x.status}</td></tr>`)
})
}

function getRTM(){
fetch(API+"/rtm",{headers:authHeaders()})
.then(r=>r.json()).then(d=>{
rtmBody.innerHTML=""
d.forEach(x=>rtmBody.innerHTML+=`<tr>
<td>${x.requirement_id}</td>
<td>${x.requirement_title}</td>
<td>${x.testcase_id}</td>
<td>${x.testcase_title}</td>
<td class="status-${x.status}">${x.status}</td>
</tr>`)
})
}

/* -------- EXTRA -------- */

function clearDB(btn){
if(!confirm("Delete everything?"))return
btnLoad(btn,"Clearing...")
fetch(API+"/clear-db",{method:"DELETE",headers:authHeaders()})
.then(()=>{btnReset(btn);log("DB cleared");location.reload()})
}

function downloadRTM(btn){
btnLoad(btn,"Downloading...")
fetch(API+"/rtm",{headers:authHeaders()})
.then(r=>r.json())
.then(data=>{
let csv="Requirement ID,Requirement Title,Test Case ID,Test Case Title,Status\n"
data.forEach(r=>{
csv+=`${r.requirement_id},"${r.requirement_title}",${r.testcase_id},"${r.testcase_title}",${r.status}\n`
})
const blob=new Blob([csv],{type:"text/csv"})
const url=URL.createObjectURL(blob)
const a=document.createElement("a")
a.href=url
a.download="RTM.csv"
a.click()
})
.finally(()=>btnReset(btn))
}

if(localStorage.getItem("token"))showMain()
</script>

</body>
</html>
