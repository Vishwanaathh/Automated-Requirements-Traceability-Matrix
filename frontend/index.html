<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RTM System</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 30px;
}

.hidden {
    display: none;
}

.section {
    border: 1px solid #ccc;
    padding: 15px;
    margin-bottom: 20px;
}

input, select, button {
    padding: 6px;
    margin: 5px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

th, td {
    border: 1px solid #333;
    padding: 8px;
}

th {
    background: #eee;
}

.status-Pass { color: green; font-weight: bold; }
.status-Fail { color: red; font-weight: bold; }
.status-Pending { color: orange; font-weight: bold; }

#log {
    background: #111;
    color: #0f0;
    padding: 10px;
    height: 120px;
    overflow-y: auto;
    font-size: 13px;
}
</style>
</head>

<body>

<h1>Requirement Traceability Matrix</h1>

<div id="registerPage" class="section">
<h2>Register</h2>
<input id="reg_username" placeholder="Username">
<input id="reg_password" placeholder="Password">
<input id="reg_role" placeholder="Role">
<br>
<button onclick="register()">Register</button>
<p>Already registered? <a href="#" onclick="showLogin()">Login</a></p>
</div>

<div id="loginPage" class="section hidden">
<h2>Login</h2>
<input id="login_username" placeholder="Username">
<input id="login_password" placeholder="Password">
<br>
<button onclick="login()">Login</button>
<p><a href="#" onclick="showRegister()">Back to Register</a></p>
</div>

<div id="mainPage" class="hidden">

<button onclick="logout()">Logout</button>

<div class="section">
<h2>Add Requirement</h2>
<input id="r_title" placeholder="Title">
<input id="r_desc" placeholder="Description">
<input id="r_priority" placeholder="Priority">
<br>
<button onclick="addRequirement()">Add Requirement</button>
<button onclick="getRequirements()">View Requirements</button>
</div>

<table id="reqTable" class="hidden">
<thead>
<tr>
<th>ID</th>
<th>Title</th>
<th>Description</th>
<th>Priority</th>
</tr>
</thead>
<tbody id="reqBody"></tbody>
</table>

<div class="section">
<h2>Add Test Case</h2>
<input id="t_title" placeholder="Title">
<input id="t_desc" placeholder="Description">
<input id="t_expected" placeholder="Expected Result">
<select id="t_status">
<option>Pass</option>
<option>Fail</option>
<option>Pending</option>
</select>
<br>
<button onclick="addTestCase()">Add Test Case</button>
<button onclick="getTestCases()">View Test Cases</button>
</div>

<table id="tcTable" class="hidden">
<thead>
<tr>
<th>ID</th>
<th>Title</th>
<th>Description</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tcBody"></tbody>
</table>

<div class="section">
<h2>Link RTM</h2>
<input id="req_id" type="number" placeholder="Requirement ID">
<input id="tc_id" type="number" placeholder="Test Case ID">
<button onclick="linkRTM()">Link</button>
<button onclick="getRTM()">View RTM</button>
</div>

<table>
<thead>
<tr>
<th>Req ID</th>
<th>Requirement</th>
<th>TC ID</th>
<th>Test Case</th>
<th>Status</th>
</tr>
</thead>
<tbody id="rtmBody"></tbody>
</table>

<div id="log"></div>

</div>

<script>
const API = "http://127.0.0.1:8000"

function showLogin() {
    registerPage.classList.add("hidden")
    loginPage.classList.remove("hidden")
}

function showRegister() {
    loginPage.classList.add("hidden")
    registerPage.classList.remove("hidden")
}

function showMain() {
    registerPage.classList.add("hidden")
    loginPage.classList.add("hidden")
    mainPage.classList.remove("hidden")
}

function logout() {
    localStorage.removeItem("token")
    location.reload()
}

function authHeaders() {
    return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + localStorage.getItem("token")
    }
}

function log(msg) {
    logBox.textContent += msg + "\n"
}

function register() {
    fetch(API + "/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            username: reg_username.value,
            password: reg_password.value,
            role: reg_role.value
        })
    }).then(() => {
        alert("Registered successfully")
        showLogin()
    })
}

function login() {
    fetch(API + "/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            username: login_username.value,
            password: login_password.value
        })
    })
    .then(res => res.json())
    .then(data => {
        localStorage.setItem("token", data.access_token)
        showMain()
    })
}

function addRequirement() {
    fetch(API + "/requirement", {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify({
            title: r_title.value,
            description: r_desc.value,
            priority: r_priority.value
        })
    }).then(() => log("Requirement added"))
}

function addTestCase() {
    fetch(API + "/testcase", {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify({
            title: t_title.value,
            description: t_desc.value,
            expected_result: t_expected.value,
            status: t_status.value
        })
    }).then(() => log("Test case added"))
}

function getRequirements() {
    fetch(API + "/requirements", { headers: authHeaders() })
    .then(res => res.json())
    .then(data => {
        reqTable.classList.remove("hidden")
        reqBody.innerHTML = ""
        data.forEach(r => {
            reqBody.innerHTML += `
            <tr>
                <td>${r.id}</td>
                <td>${r.title}</td>
                <td>${r.description}</td>
                <td>${r.priority}</td>
            </tr>`
        })
    })
}

function getTestCases() {
    fetch(API + "/testcases", { headers: authHeaders() })
    .then(res => res.json())
    .then(data => {
        tcTable.classList.remove("hidden")
        tcBody.innerHTML = ""
        data.forEach(t => {
            tcBody.innerHTML += `
            <tr>
                <td>${t.id}</td>
                <td>${t.title}</td>
                <td>${t.description}</td>
                <td>${t.status}</td>
            </tr>`
        })
    })
}

function linkRTM() {
    fetch(API + "/rtmmap", {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify({
            reqid: Number(req_id.value),
            testid: Number(tc_id.value)
        })
    }).then(() => log("RTM linked"))
}

function getRTM() {
    fetch(API + "/rtm", { headers: authHeaders() })
    .then(res => res.json())
    .then(data => {
        rtmBody.innerHTML = ""
        data.forEach(r => {
            rtmBody.innerHTML += `
            <tr>
                <td>${r.requirement_id}</td>
                <td>${r.requirement_title}</td>
                <td>${r.testcase_id}</td>
                <td>${r.testcase_title}</td>
                <td class="status-${r.status}">${r.status}</td>
            </tr>`
        })
    })
}

if (localStorage.getItem("token")) {
    showMain()
}
</script>

</body>
</html>
